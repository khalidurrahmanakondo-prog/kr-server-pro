<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KR Downloader Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark: #0f172a;
            --light: #f8fafc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            color: var(--light);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: auto;
            width: 90%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin: 0;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 15px;
            display: flex;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
        }

        button.download-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button.download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .download-list {
            margin-top: 30px;
        }

        .download-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
        }

        .progress-bar {
            height: 6px;
            background: #334155;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: 0.4s;
        }

        .status-text {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            cursor: pointer;
            padding-bottom: 5px;
        }

        .nav-link.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        #dl-manager { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>KR DL PRO</h1>
        <p>ভিডিও ডাউনলোডার ইঞ্চিন v2.0</p>
    </div>

    <div class="nav-tabs">
        <span class="nav-link active" onclick="tab('home', this)">Home</span>
        <span class="nav-link" onclick="tab('dl-manager', this)">Downloads</span>
    </div>

    <div id="home">
        <div class="input-group">
            <input type="text" id="url-input" placeholder="Paste video link here...">
            <button class="download-btn" onclick="addNewDownload()">
                <i class="fas fa-download"></i>
            </button>
        </div>
        <p style="text-align: center; color: #64748b; font-size: 0.8rem; margin-top: 20px;">
            Supports: TikTok, FB, YouTube, Insta & more
        </p>
    </div>

    <div id="dl-manager">
        <div id="download-items-container" class="download-list">
            </div>
    </div>
</div>

<script>
    let activeDownloads = [];

    function tab(id, el) {
        document.getElementById('home').style.display = 'none';
        document.getElementById('dl-manager').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        el.classList.add('active');
    }

    async function addNewDownload() {
        const urlInput = document.getElementById('url-input');
        const url = urlInput.value.trim();
        
        if(!url) return alert("দয়া করে একটি সঠিক লিঙ্ক দিন!");
        
        const dlId = Math.floor(1000 + Math.random() * 9000);
        activeDownloads.unshift({ 
            id: dlId, 
            status: "ইঞ্জিনের সাথে কানেক্ট হচ্ছে...", 
            progress: 20 
        });
        
        renderDownloadList();
        tab('dl-manager', document.querySelectorAll('.nav-link')[1]);
        urlInput.value = "";

        // আপনার রেন্ডার সার্ভার লিঙ্ক
        const myApiUrl = `https://kr-server-pro.onrender.com/download?url=${encodeURIComponent(url)}`;

        try {
            const response = await fetch(myApiUrl);
            const data = await response.json();

            if (data.status === "success" && data.url) {
                updateProgress(dlId, 100, "ডাউনলোড শুরু হচ্ছে...");
                
                // সরাসরি ডাউনলোড ট্রিগার
                const a = document.createElement('a');
                a.href = data.url;
                a.download = (data.title || 'KR_Video') + '.mp4';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } else {
                updateProgress(dlId, 0, "ভুল লিঙ্ক বা ভিডিওটি পাওয়া যায়নি।");
            }
        } catch (e) {
            updateProgress(dlId, 0, "সার্ভার রেসপন্স করছে না (প্রথমবার ৩০ সেকেন্ড সময় লাগতে পারে)");
        }
    }

    function updateProgress(id, prog, status) {
        const item = activeDownloads.find(d => d.id === id);
        if(item) {
            item.progress = prog;
            item.status = status;
            renderDownloadList();
        }
    }

    function renderDownloadList() {
        const container = document.getElementById('download-items-container');
        container.innerHTML = activeDownloads.map(dl => `
            <div class="download-item">
                <div style="display: flex; justify-content: space-between;">
                    <span style="font-size: 0.9rem;">Task #${dl.id}</span>
                    <span class="status-text">${dl.status}</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${dl.progress}%"></div>
                </div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
